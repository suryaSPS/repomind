version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: repomind-db
    environment:
      POSTGRES_DB: repomind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d repomind']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
